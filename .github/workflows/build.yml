name: build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
    strategy:
      matrix:
        branch:
          - '24.10'
          - '25.12'
        arch:
          - aarch64_cortex-a53
          - mipsel_24kc
    container:
      image: openwrt/sdk:${{ matrix.arch }}-openwrt-${{ matrix.branch }}
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: '/builder/.ccache'
          key: ccache-${{ matrix.arch }}-openwrt-${{ matrix.branch }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.arch }}-openwrt-${{ matrix.branch }}-

      - name: Prepare build
        id: prepare
        shell: bash
        run : |
          apt-get update
          apt-get install -y jq
          TAG=$(wget -qO- 'https://api.github.com/repos/bol-van/zapret/releases/latest' | jq -r '.tag_name')
          sed -i "s|_VERSION_|${TAG/v}|" "$GITHUB_WORKSPACE/nfqws/Makefile"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build package
        id: build
        working-directory: /builder
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          CCACHE_DIR: /builder/.ccache
        shell: bash
        run: |
          ./setup.sh
          mv feeds.conf.default feeds.conf
          echo "src-link nfqws $GITHUB_WORKSPACE" >> feeds.conf
          scripts/feeds update -a
          scripts/feeds install -ap nfqws
          make defconfig
          make package/nfqws/compile V=s -j$(nproc) BUILD_LOG=1
          for pkg in $(find -name 'nfqws-*.apk'); do
            mv -v "$pkg" "${pkg%.apk}-${ARCH}.apk"
          done
          tar cvf "${GITHUB_WORKSPACE}/pkg-openwrt-${BRANCH}-${ARCH}.tar" -C bin/packages/*/nfqws --transform "s|^\./|${BRANCH}/${ARCH}/|" --show-transformed-names .

      - name: Compress build logs
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          LOGS_DIR: '/builder/logs'
        run: |
          [ -d "${LOGS_DIR}" ] || mkdir "${LOGS_DIR}"
          tar cJvf "logs-openwrt-${BRANCH}-${ARCH}.tar.xz" "${LOGS_DIR}"

      - name: Upload packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: pkg-openwrt-${{ matrix.branch }}-${{ matrix.arch }}
          path: ./**/pkg-openwrt-${{ matrix.branch }}-${{ matrix.arch }}.tar
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-openwrt-${{ matrix.branch }}-${{ matrix.arch }}
          path: ./**/logs-*.tar.xz

  release:
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        branch:
          - '24.10'
          - '25.12'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pkg-*

      - name: Prepare files
        env:
          BRANCH: ${{ matrix.branch }}
        run: |
          find . -name "pkg-openwrt-${BRANCH}-*.tar" -exec tar -xvf {} --wildcards '*pk' \;

      - name: Upload release assets
        uses: ncipollo/release-action@v1.20.0
        with:
          allowUpdates: true
          prerelease: false
          tag: ${{ needs.build.outputs.tag }}-openwrt-${{ matrix.branch }}
          name: ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}
          artifacts: ./**/*pk
